
arch: amd64
cores: 2
features: nesting=1
hostname: OpenWrt
memory: 512
net0: name=eth0,bridge=vmbr0,gw=192.168.10.1,hwaddr=BC:24:11:DD:8D:D0,ip=192.168.10.10/24,type=veth
net1: name=eth1,bridge=vmbr0,hwaddr=BC:24:11:2E:E2:25,type=veth
onboot: 1
ostype: unmanaged
rootfs: local-lvm:vm-100-disk-1,size=1G
swap: 512
lxc.cgroup2.devices.allow: c 10:200 rwm
lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
